{% extends 'base.html' %}
{% load static %}

{% block title %}Login — QR Restaurant System{% endblock %}

{% block body %}
<div class="login-page">
    <div class="login-card animate-fade-in">
        <div class="text-center mb-4">
            <i class="fas fa-utensils fa-3x" style="color:var(--primary);"></i>
            <h2 class="mt-2">Welcome Back</h2>
            <p class="text-muted">Sign in to manage your restaurant</p>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/admin-panel/register/" class="text-decoration-none" style="color:var(--primary);">
                Register as Restaurant Owner <i class="fas fa-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
if (api.isLoggedIn()) {
    const user = api.getUser();
    if (user?.role === 'super_admin') window.location.href = '/superadmin/';
    else window.location.href = '/admin-panel/';
}

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

    try {
        const user = await api.login(
            document.getElementById('username').value,
            document.getElementById('password').value
        );
        showToast(`Welcome, ${user.first_name || user.username}!`, 'success');
        setTimeout(() => {
            if (user.role === 'super_admin') window.location.href = '/superadmin/';
            else window.location.href = '/admin-panel/';
        }, 500);
    } catch (e) {
        let msg = e.message || 'Invalid credentials';
        // Make Django's default JWT error more user-friendly
        if (msg.includes('No active account')) {
            msg = 'Invalid username or password. Please try again.';
        }
        showToast(msg, 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
    }
}
</script>
{% endblock %}
